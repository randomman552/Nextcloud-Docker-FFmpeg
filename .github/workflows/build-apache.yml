name: Build apache

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  VARIANT: 'apache'
  PREFIXES: '["stable"]'
  REGISTRY: 'ghcr.io'
  REPOSITORY: ${{ github.repository }}
  DOCKERFILE: Dockerfile

jobs:
  get-tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.fetch.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch tags from upstream image
        id: fetch
        run: |
          TAGS=$(python .github/scripts/fetch_tags.py)
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

  build:
    needs: get-tags
    runs-on: ubuntu-latest
    name: build (${{ matrix.tags[0] }})
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include: ${{ fromJson(needs.get-tags.outputs.tags) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
  
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ join(matrix.image_tags, ',') }}
          labels: ${{ steps.meta.outputs.labels }}
          file: ${{ env.DOCKERFILE }}
          build-args: |
            BASE_TAG=${{ matrix.tags[0] }}
