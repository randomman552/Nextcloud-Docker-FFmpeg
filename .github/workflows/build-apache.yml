name: Build apache

on:
  workflow_dispatch:
env:
  VARIANT: 'apache'
  PREFIXES: '["stable"]'

jobs:
  get-tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.fetch.outputs.tags }}
    steps:
      - name: Fetch tags from upstream image
        id: fetch
        run: |
          TAGS=$(curl -s "https://hub.docker.com/v2/repositories/library/nextcloud/tags/?page_size=100" \
            | jq -c --arg variant "$VARIANT" --argjson prefixes "$PREFIXES" -r '[.results[].name | select(endswith($variant)) | select(startswith($prefixes[]))]')
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

  build:
    needs: get-tags
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tag: ${{ fromJson(needs.get-tags.outputs.tags) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ matrix.tag }}
          build-args: |
            BASE_TAG=${{ matrix.tag }}
