name: List upstream tags

on:
  workflow_dispatch:
env:
  PREFIXES: '["stable", "31", "32", "33"]'

jobs:
  get-tags:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch apache tags from upstream image
        run: |
          curl -s "https://hub.docker.com/v2/repositories/library/nextcloud/tags/?page_size=100" \
            | jq --argjson prefixes "$PREFIXES" -r '.results[].name | select(endswith("apache")) | select(startswith($prefixes[]))'

      - name: Fetch fpm tags from upstream image
        run: |
          curl -s "https://hub.docker.com/v2/repositories/library/nextcloud/tags/?page_size=100" \
            | jq --argjson prefixes "$PREFIXES" -r '.results[].name | select(endswith("fpm")) | select(startswith($prefixes[]))'

      - name: Fetch fpm-alpine tags from upstream image
        run: |
          curl -s "https://hub.docker.com/v2/repositories/library/nextcloud/tags/?page_size=100" \
            | jq --argjson prefixes "$PREFIXES" -r '.results[].name | select(endswith("fpm-alpine")) | select(startswith($prefixes[]))'
